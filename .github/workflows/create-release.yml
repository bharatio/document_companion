name: Create Release on Version Branch

on:
  push:
    branches:
      - 'v*.*.*'  # Matches branches like v1.0.0, v2.1.3, etc.

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for proper changelog generation
      
      - name: Extract version from branch name
        id: extract_version
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          VERSION=${BRANCH_NAME#v}  # Remove 'v' prefix
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH_NAME"
          echo "Version: $VERSION"
          echo "Tag: v$VERSION"
      
      - name: Check if release already exists
        id: check_release
        run: |
          TAG=${{ steps.extract_version.outputs.tag }}
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          
          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Release $TAG already exists, skipping creation"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "✅ Release $TAG does not exist, will create"
          fi
        continue-on-error: true
      
      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION=${{ steps.extract_version.outputs.version }}
          TAG=${{ steps.extract_version.outputs.tag }}
          
          # Try to extract changelog entry for this version
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            # Look for pattern like "## [1.0.0]" or "## [v1.0.0]"
            CHANGELOG_CONTENT=$(awk "/^## \[.*${VERSION}\]/,/^## \[/" CHANGELOG.md | sed '$d' || echo "")
            
            if [ -z "$CHANGELOG_CONTENT" ]; then
              # Try with v prefix
              CHANGELOG_CONTENT=$(awk "/^## \[.*v${VERSION}\]/,/^## \[/" CHANGELOG.md | sed '$d' || echo "")
            fi
            
            if [ -n "$CHANGELOG_CONTENT" ]; then
              echo "changelog<<EOF" >> $GITHUB_OUTPUT
              echo "$CHANGELOG_CONTENT" >> $GITHUB_OUTPUT
              echo "EOF" >> $GITHUB_OUTPUT
            else
              echo "changelog=Release $TAG" >> $GITHUB_OUTPUT
            fi
          else
            echo "changelog=Release $TAG" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
      
      - name: Create GitHub Release
        if: steps.check_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.extract_version.outputs.tag }}
          name: Release ${{ steps.extract_version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
            
            **Full Changelog**: ${{ github.repositoryUrl }}/compare/${{ steps.extract_version.outputs.tag }}...HEAD
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Output release URL
        if: steps.check_release.outputs.exists != 'true'
        run: |
          TAG=${{ steps.extract_version.outputs.tag }}
          echo "✅ Release created successfully!"
          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG"

